name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Check, test, typecheck, and build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Browser smoke test
        run: |
          set -euo pipefail
          chromium_path="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium)"
          test -n "$chromium_path"

          PORT=8894 pnpm start &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8894/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent --show-error http://127.0.0.1:8894/ >/dev/null
          CHROMIUM_PATH="$chromium_path" TEST_URL=http://127.0.0.1:8894 pnpm test:e2e
