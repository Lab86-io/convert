name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Check, test, typecheck, and build
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and lint
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Browser smoke test
        run: |
          set -euo pipefail
          chromium_path="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium)"
          test -n "$chromium_path"

          PORT=8894 pnpm start &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8894/ >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent --show-error http://127.0.0.1:8894/ >/dev/null
          CHROMIUM_PATH="$chromium_path" TEST_URL=http://127.0.0.1:8894 pnpm test:e2e
